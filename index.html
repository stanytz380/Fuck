<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STANY MIN TV ADMIN - Mobile Control</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary: #00e676;
        --secondary: #00bcd4;
        --bg: #050505;
        --card: #141414;
        --text: #ffffff;
        --border: #222;
        --gray: #888;
        --danger: #ff3b30;
        --success: #34c759;
        --warning: #ff9500;
        --premium: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    /* Scrollbar (optional) */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    /* Top Bar */
    .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--card);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .brand {
        font-size: 1.3em;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .back-btn {
        display: none;
        font-size: 1.2em;
        padding: 8px;
        cursor: pointer;
        margin-right: 10px;
        color: var(--text);
    }
    .header-actions {
        display: flex;
        gap: 12px;
    }
    .header-actions i {
        font-size: 1.3em;
        cursor: pointer;
        padding: 8px;
        transition: 0.2s;
    }
    .header-actions i:active { transform: scale(0.9); }

    /* Main container */
    .view-container {
        padding: 16px;
        padding-bottom: 80px;
    }

    /* Home grid */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
    }
    .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        text-align: center;
    }
    .stat-number { font-size: 1.8em; font-weight: bold; margin-bottom: 4px; }
    .stat-label { font-size: 0.8em; color: var(--gray); }

    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
        margin-top: 8px;
    }
    .menu-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .menu-card:active { transform: scale(0.96); background: #1f1f1f; }
    .menu-icon { font-size: 2em; margin-bottom: 8px; }
    .menu-title { font-size: 1em; font-weight: 600; margin-bottom: 4px; }
    .menu-count { font-size: 0.75em; color: var(--gray); }
    .premium-card { border: 2px solid var(--premium); position: relative; overflow: hidden; }
    .premium-card::before {
        content: "PREMIUM";
        position: absolute;
        top: 8px;
        right: -25px;
        background: var(--premium);
        color: black;
        padding: 2px 25px;
        font-size: 0.65em;
        font-weight: bold;
        transform: rotate(45deg);
    }

    /* Page views */
    .page-view {
        display: none;
        animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Form & card styles */
    .section-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
    }
    .section-title {
        font-size: 1.2em;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--primary);
    }
    .input-group { margin-bottom: 16px; }
    .input-group label {
        display: block;
        font-size: 0.8em;
        color: var(--gray);
        margin-bottom: 6px;
    }
    input, select, textarea {
        width: 100%;
        padding: 12px 14px;
        background: #000;
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 0.95em;
        transition: 0.2s;
    }
    input:focus, select:focus, textarea:focus {
        border-color: var(--primary);
        outline: none;
    }
    button {
        background: var(--primary);
        color: black;
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
        font-size: 1em;
    }
    button:active { transform: scale(0.96); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: #333; color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.8em; width: auto; display: inline-block; }

    /* Lists */
    .item-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    .item-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
    }
    .item-img {
        width: 100%;
        height: 100px;
        object-fit: cover;
        background: #111;
    }
    .item-body {
        padding: 10px;
    }
    .item-title {
        font-weight: 600;
        font-size: 0.9em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 8px;
    }
    .item-actions {
        display: flex;
        gap: 8px;
    }
    .item-actions button { width: auto; padding: 6px 12px; font-size: 0.75em; }

    /* User rows */
    .user-row {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .user-row:active { background: #1f1f1f; }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; margin-bottom: 4px; }
    .user-email { font-size: 0.8em; color: var(--gray); }
    .user-status {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.7em;
        font-weight: bold;
    }
    .status-blocked { background: var(--danger); color: white; }
    .status-premium { background: var(--premium); color: black; }
    .status-trial { background: var(--warning); color: black; }
    .status-active { background: var(--success); color: black; }
    .status-expired { background: var(--gray); color: white; }
    .status-new { background: var(--secondary); color: black; }

    /* Chat */
    .chat-user {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }
    .chat-user-info { flex: 1; }
    .chat-user-name { font-weight: 600; }
    .chat-user-email { font-size: 0.7em; color: var(--gray); }
    .chat-user-msg { font-size: 0.85em; margin-top: 6px; color: #ccc; }
    .badge {
        background: var(--danger);
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.7em;
        font-weight: bold;
    }

    .chat-room {
        display: none;
        flex-direction: column;
        height: calc(100vh - 120px);
    }
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .msg {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 20px;
        font-size: 0.9em;
    }
    .msg-in {
        background: #222;
        align-self: flex-start;
    }
    .msg-out {
        background: var(--primary);
        color: black;
        align-self: flex-end;
    }
    .msg-info { font-size: 0.7em; color: var(--gray); margin-bottom: 4px; }
    .chat-input-area {
        display: flex;
        gap: 10px;
        padding: 12px;
        background: var(--card);
        border-top: 1px solid var(--border);
    }
    .chat-input-area input { flex: 1; margin: 0; }
    .chat-input-area button { width: auto; padding: 0 20px; }

    /* Modals */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .modal-content {
        background: var(--card);
        border-radius: 28px;
        padding: 24px;
        width: 100%;
        max-width: 500px;
        border: 1px solid var(--primary);
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
    }
    .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        font-size: 1.2em;
        cursor: pointer;
        color: var(--gray);
    }

    /* Toast */
    #toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #222;
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 0.9em;
        z-index: 1100;
        display: none;
        white-space: nowrap;
        border: 1px solid var(--primary);
    }

    /* Multi-select container */
    .multi-select-container {
        background: #000;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px;
        max-height: 150px;
        overflow-y: auto;
    }
    .multi-select-item {
        display: flex;
        align-items: center;
        padding: 8px;
        gap: 8px;
        cursor: pointer;
        border-radius: 8px;
    }
    .multi-select-item:hover { background: #222; }

    /* Small utilities */
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mb-2 { margin-bottom: 12px; }
    .mt-2 { margin-top: 12px; }
    .text-center { text-align: center; }
    .gap-2 { gap: 8px; }
</style>
</head>
<body>

<!-- Auth Modal -->
<div id="authModal" class="modal" style="display:flex;">
    <div class="modal-content">
        <h2 style="color:var(--primary); text-align:center; margin-bottom:20px;">ADMIN ACCESS</h2>
        <input type="email" id="lemail" placeholder="Admin Email" class="input-group" style="margin-bottom:12px;">
        <input type="password" id="lpass" placeholder="Password" class="input-group" style="margin-bottom:20px;">
        <button onclick="login()">LOGIN</button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">
    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <i class="fas fa-arrow-left back-btn" id="backBtn" onclick="goHome()"></i>
            <div class="brand" id="pageTitle">STANY ADMIN</div>
        </div>
        <div class="header-actions">
            <i class="fas fa-bell" onclick="openPage('notif')"></i>
            <i class="fas fa-sign-out-alt" onclick="auth.signOut()"></i>
        </div>
    </div>

    <div class="view-container">
        <!-- Home Dashboard -->
        <div id="homeView">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <!-- All pages will be injected here dynamically via JS -->
        <div id="pagesContainer"></div>
    </div>
</div>

<div id="toast">Saved</div>

<script>
    // Firebase Config (same as user app)
    const firebaseConfig = {
        apiKey: "AIzaSyAGQqAiYCnWR7X8XkxEXCGu19PU45qXDnc",
        authDomain: "stanyappstore.firebaseapp.com",
        projectId: "stanyappstore",
        storageBucket: "stanyappstore.firebasestorage.app",
        messagingSenderId: "735017831251",
        appId: "1:735017831251:web:9fa4184ef141349fb9afa6",
        measurementId: "G-EM3RTMBKTN"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let allUsers = [], channels = {}, movies = {}, downloads = {}, tips = {}, bettingTips = {}, categories = [];
    let appSettings = { cardSize: 'medium', fontSize: 'medium', carouselInterval: 5000, lockedChannels: [], freeChannels: [], channelScripts: {} };
    let currentChatUid = null;
    let currentUser = null;

    // Navigation
    function openPage(pageId) {
        document.getElementById('homeView').style.display = 'none';
        const page = document.getElementById(pageId);
        if(page) {
            document.querySelectorAll('.page-view').forEach(p => p.style.display = 'none');
            page.style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('pageTitle').innerText = pageId.toUpperCase();
            if(pageId === 'users') filterUsers('all');
            if(pageId === 'channels') loadChannels();
            if(pageId === 'movies') loadMovies();
            if(pageId === 'downloads') loadDownloads();
            if(pageId === 'categories') loadCategoriesUI();
            if(pageId === 'tips') loadTips();
            if(pageId === 'bettingTips') initBettingTips();
            if(pageId === 'chat') loadChatList();
            if(pageId === 'devices') loadDeviceRequests();
            if(pageId === 'appSettings') loadAppSettingsPage();
            if(pageId === 'newUsers') filterNewUsers('today');
        }
    }
    function goHome() {
        document.getElementById('homeView').style.display = 'block';
        document.querySelectorAll('.page-view').forEach(p => p.style.display = 'none');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('pageTitle').innerText = 'STANY ADMIN';
    }

    // Authentication
    auth.onAuthStateChanged(u => {
        if(u) {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            currentUser = u;
            loadDashboard();
            loadAllData();
        } else {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    function login() {
        const email = document.getElementById('lemail').value;
        const pass = document.getElementById('lpass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
    }

    // Dashboard and menu generation
    function loadDashboard() {
        const statsDiv = document.getElementById('statsGrid');
        statsDiv.innerHTML = `
            <div class="stat-card"><div class="stat-number" id="statTotalUsers">0</div><div class="stat-label">Users</div></div>
            <div class="stat-card"><div class="stat-number" id="statPremiumUsers">0</div><div class="stat-label">Premium</div></div>
            <div class="stat-card"><div class="stat-number" id="statTrialUsers">0</div><div class="stat-label">Trial</div></div>
            <div class="stat-card"><div class="stat-number" id="statNewUsers">0</div><div class="stat-label">New Today</div></div>
        `;
        const menuGrid = document.getElementById('menuGrid');
        const menuItems = [
            { icon: 'users', title: 'Users', id: 'users', count: '0 Registered' },
            { icon: 'tv', title: 'Live Channels', id: 'channels', count: '0 Live' },
            { icon: 'film', title: 'Movies', id: 'movies', count: '0 Added' },
            { icon: 'crown', title: 'Premium', id: 'premium', count: 'Exclusive', premium: true },
            { icon: 'download', title: 'Downloads', id: 'downloads', count: '0 Files' },
            { icon: 'comments', title: 'Chat Bot', id: 'chat', count: '0 New' },
            { icon: 'mobile-alt', title: 'Device Requests', id: 'devices', count: '0 Pending' },
            { icon: 'cog', title: 'Settings', id: 'settings', count: 'App Config' },
            { icon: 'layer-group', title: 'Categories', id: 'categories', count: 'Arrange' },
            { icon: 'lightbulb', title: 'Tips & Guides', id: 'tips', count: 'User Ed' },
            { icon: 'chart-line', title: 'Betting Tips', id: 'bettingTips', count: '0 Tips' },
            { icon: 'sliders-h', title: 'App Settings', id: 'appSettings', count: 'UI & Features' },
            { icon: 'user-plus', title: 'New Users', id: 'newUsers', count: '0 Today' }
        ];
        menuGrid.innerHTML = '';
        menuItems.forEach(item => {
            const card = document.createElement('div');
            card.className = `menu-card ${item.premium ? 'premium-card' : ''}`;
            card.innerHTML = `<i class="fas fa-${item.icon} menu-icon"></i><div class="menu-title">${item.title}</div><div class="menu-count" id="cnt${item.id.replace(/\s/g,'')}">${item.count}</div>`;
            card.onclick = () => openPage(item.id);
            menuGrid.appendChild(card);
        });
    }

    function loadAllData() {
        // Users
        db.ref('users').on('value', s => {
            allUsers = [];
            let total = 0, premium = 0, trial = 0, newToday = 0;
            const today = new Date().toDateString();
            s.forEach(c => {
                const u = { key: c.key, ...c.val() };
                u.isExpired = u.accessExpiry && u.accessExpiry < Date.now();
                total++;
                if(u.isBlocked) {}
                else if(u.subscriptionType === 'premium' && !u.isExpired) premium++;
                else if(u.subscriptionType === 'trial' && !u.isExpired) trial++;
                const joinDate = u.joinDate ? new Date(u.joinDate).toDateString() : new Date(u.createdAt || c.key).toDateString();
                if(joinDate === today && !u.isBlocked) newToday++;
                allUsers.push(u);
            });
            document.getElementById('statTotalUsers').innerText = total;
            document.getElementById('statPremiumUsers').innerText = premium;
            document.getElementById('statTrialUsers').innerText = trial;
            document.getElementById('statNewUsers').innerText = newToday;
            document.getElementById('cntusers').innerText = total + ' Registered';
            document.getElementById('cntnewUsers').innerText = newToday + ' Today';
            if(document.getElementById('users') && document.getElementById('users').style.display !== 'none') filterUsers('all');
        });

        // Channels
        db.ref('channels').on('value', s => {
            channels = {};
            s.forEach(c => { channels[c.key] = { id: c.key, ...c.val() }; });
            document.getElementById('cntchannels').innerText = s.numChildren() + ' Live';
            if(document.getElementById('channels') && document.getElementById('channels').style.display !== 'none') loadChannels();
        });
        // Movies
        db.ref('movies').on('value', s => {
            movies = {};
            s.forEach(c => { movies[c.key] = { id: c.key, ...c.val() }; });
            document.getElementById('cntmovies').innerText = s.numChildren() + ' Added';
            if(document.getElementById('movies') && document.getElementById('movies').style.display !== 'none') loadMovies();
        });
        // Downloads
        db.ref('downloadableMovies').on('value', s => {
            downloads = {};
            let cnt = 0;
            s.forEach(c => { downloads[c.key] = { id: c.key, ...c.val() }; cnt++; });
            document.getElementById('cntdownloads').innerText = cnt + ' Files';
            if(document.getElementById('downloads') && document.getElementById('downloads').style.display !== 'none') loadDownloads();
        });
        // Tips
        db.ref('tips').on('value', s => {
            tips = {};
            s.forEach(c => { tips[c.key] = { id: c.key, ...c.val() }; });
            if(document.getElementById('tips') && document.getElementById('tips').style.display !== 'none') loadTips();
        });
        // Betting Tips
        db.ref('bettingTips').on('value', s => {
            bettingTips = {};
            let cnt = 0;
            s.forEach(c => { bettingTips[c.key] = { id: c.key, ...c.val() }; cnt++; });
            document.getElementById('cntbettingTips').innerText = cnt + ' Tips';
            if(document.getElementById('bettingTips') && document.getElementById('bettingTips').style.display !== 'none') initBettingTips();
        });
        // Categories
        db.ref('genres').on('value', s => {
            categories = [];
            s.forEach(c => { categories.push({ id: c.key, name: c.val().name }); });
            if(document.getElementById('categories') && document.getElementById('categories').style.display !== 'none') loadCategoriesUI();
        });
        // App settings
        db.ref('appSettings').on('value', s => { if(s.exists()) appSettings = s.val(); });
        // Device requests
        db.ref('deviceRequests').on('value', s => {
            let pending = 0;
            s.forEach(r => { if(r.val().status === 'pending') pending++; });
            document.getElementById('cntdevices').innerText = pending + ' Pending';
            if(document.getElementById('devices') && document.getElementById('devices').style.display !== 'none') loadDeviceRequests();
        });
        // Chat new messages
        db.ref('stanyBotMessages').on('value', s => {
            let newMsgs = 0;
            s.forEach(userChat => {
                userChat.forEach(msg => { if(msg.val().sender === 'user' && !msg.val().read) newMsgs++; });
            });
            document.getElementById('cntchat').innerText = newMsgs + ' New';
            if(document.getElementById('chat') && document.getElementById('chat').style.display !== 'none') loadChatList();
        });
    }

    // Helper to create page containers dynamically if not exist
    function ensurePage(pageId) {
        if(!document.getElementById(pageId)) {
            const container = document.getElementById('pagesContainer');
            const div = document.createElement('div');
            div.id = pageId;
            div.className = 'page-view';
            container.appendChild(div);
        }
        return document.getElementById(pageId);
    }

    // User Management
    function filterUsers(type) {
        const page = ensurePage('users');
        page.innerHTML = `<div class="flex-between mb-2"><h3>Users</h3><div><input id="searchUser" placeholder="Search..." style="width:150px; padding:8px;" onkeyup="searchUI()"></div></div>`;
        let filtered = allUsers;
        switch(type) {
            case 'premium': filtered = allUsers.filter(u => u.subscriptionType === 'premium' && !u.isExpired && !u.isBlocked); break;
            case 'trial': filtered = allUsers.filter(u => u.subscriptionType === 'trial' && !u.isExpired && !u.isBlocked); break;
            case 'active': filtered = allUsers.filter(u => !u.isExpired && !u.isBlocked && u.accessExpiry); break;
            case 'blocked': filtered = allUsers.filter(u => u.isBlocked); break;
            case 'expired': filtered = allUsers.filter(u => u.isExpired && !u.isBlocked); break;
            case 'new': const today = new Date().toDateString(); filtered = allUsers.filter(u => { const joinDate = u.joinDate ? new Date(u.joinDate).toDateString() : new Date(u.createdAt || u.key).toDateString(); return joinDate === today && !u.isBlocked; }); break;
        }
        filtered.forEach(u => {
            let statusClass = '';
            let statusText = '';
            if(u.isBlocked) { statusClass = 'status-blocked'; statusText = 'BLOCKED'; }
            else if(u.isExpired) { statusClass = 'status-expired'; statusText = 'EXPIRED'; }
            else if(u.subscriptionType === 'premium') { statusClass = 'status-premium'; statusText = 'PREMIUM'; }
            else if(u.subscriptionType === 'trial') { statusClass = 'status-trial'; statusText = 'TRIAL'; }
            else { statusClass = 'status-active'; statusText = 'ACTIVE'; }
            const days = u.accessExpiry ? Math.ceil((u.accessExpiry - Date.now())/(86400000)) : 0;
            page.innerHTML += `
                <div class="user-row" onclick="openUserModal('${u.key}')">
                    <div class="user-info">
                        <div class="user-name">${u.name || 'No Name'}</div>
                        <div class="user-email">${u.email}</div>
                        <div style="font-size:0.7em; color:var(--gray);">${days > 0 ? days+' days left' : (u.accessExpiry ? 'Expired' : 'No sub')}</div>
                    </div>
                    <div class="user-status ${statusClass}">${statusText}</div>
                </div>
            `;
        });
    }
    function searchUI() {
        const query = document.getElementById('searchUser').value.toLowerCase();
        document.querySelectorAll('.user-row').forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? 'flex' : 'none';
        });
    }

    function openUserModal(uid) {
        const u = allUsers.find(x => x.key === uid);
        if(!u) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <i class="fas fa-times modal-close" onclick="this.closest('.modal').remove()"></i>
                <h3 style="margin-bottom:12px;">${u.name || 'User'}</h3>
                <p>${u.email}</p>
                <div class="input-group"><label>Subscription</label><select id="umSubType" onchange="toggleSubFields()"><option value="trial" ${u.subscriptionType==='trial'?'selected':''}>Free Trial</option><option value="premium" ${u.subscriptionType==='premium'?'selected':''}>Premium</option><option value="none" ${!u.subscriptionType?'selected':''}>None</option></select></div>
                <div id="subFields" style="${u.subscriptionType==='none'?'display:none':''}"><label>Expiry Date</label><input type="date" id="umDate" value="${u.accessExpiry ? new Date(u.accessExpiry).toISOString().split('T')[0] : ''}"></div>
                <div class="flex-between gap-2 mt-2"><button onclick="saveUserSub('${uid}')">Save</button><button class="btn-danger" onclick="toggleBlock('${uid}', ${u.isBlocked})">${u.isBlocked ? 'Unblock' : 'Block'}</button></div>
                <div class="mt-2"><button class="btn-secondary" onclick="forceLogout('${uid}')">Force Logout</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        window.toggleSubFields = () => { document.getElementById('subFields').style.display = document.getElementById('umSubType').value === 'none' ? 'none' : 'block'; };
        window.saveUserSub = (uid) => {
            const type = document.getElementById('umSubType').value;
            const date = document.getElementById('umDate').value;
            const updates = { subscriptionType: type };
            if(type !== 'none' && date) updates.accessExpiry = new Date(date).getTime();
            else if(type === 'none') updates.accessExpiry = null;
            db.ref('users/'+uid).update(updates).then(() => { toast("Updated"); modal.remove(); });
        };
        window.toggleBlock = (uid, isBlocked) => {
            db.ref('users/'+uid+'/isBlocked').set(!isBlocked).then(() => { toast(isBlocked ? "Unblocked" : "Blocked"); modal.remove(); });
        };
        window.forceLogout = (uid) => {
            db.ref('users/'+uid+'/activeDeviceId').set(null).then(() => { toast("Logged out"); modal.remove(); });
        };
    }
